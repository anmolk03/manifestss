trigger:
- main

variables:
  azureServiceConnection: 'azure-svc-conn'  # existing service connection
  aksResourceGroup: 'playgroundcleansub0'
  aksClusterName: 'aks-private-cluster'
  helmReleaseName: 'ingress-nginx'
  helmNamespace: 'ingress-nginx'

stages:
- stage: InstallIngress
  displayName: 'Install NGINX Ingress Controller'
  jobs:
  - job: HelmInstall
    displayName: 'Helm Deploy NGINX Ingress Controller'
    pool:
      name: self-hosted
    steps:
    # 1️⃣ Install kubectl
    - script: |
        echo "Downloading kubectl..."
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/
        kubectl version --client
      displayName: 'Install kubectl'

    # 2️⃣ Get AKS credentials
    - task: AzureCLI@2
      displayName: 'Get AKS credentials'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksClusterName) --overwrite-existing
          kubectl get nodes

    # 3️⃣ Install Helm
    - task: HelmInstaller@1
      displayName: 'Install Helm'
      inputs:
        helmVersionToInstall: 'latest'

    # 4️⃣ Add NGINX Helm repo
    - script: |
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo update
      displayName: 'Add NGINX Helm Repo'

    # 5️⃣ Deploy NGINX Ingress Controller with public IP
    - task: HelmDeploy@0
      displayName: 'Deploy NGINX Ingress Controller'
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: '$(azureServiceConnection)'
        namespace: '$(helmNamespace)'
        command: 'upgrade'
        chartType: 'Name'
        chartName: 'ingress-nginx/ingress-nginx'
        releaseName: '$(helmReleaseName)'
        install: true
        overrideValues: |
          controller.service.type=LoadBalancer
          controller.replicaCount=2
