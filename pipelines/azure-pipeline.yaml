trigger: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  resourceGroup: 'playgroundcleansub0'
  aksName: 'aks-private-cluster'

steps:
- task: AzureCLI@2
  displayName: 'Install NGINX via Command Invoke'
  inputs:
    azureSubscription: 'azure-svc-conn' # Your ARM Service Connection
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # 1. Add Helm Repo inside the cluster via invoke
      az aks command invoke \
        --resource-group $(resourceGroup) \
        --name $(aksName) \
        --command "helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx && helm repo update"

      # 2. Deploy NGINX
      # We use --set to ensure it gets a Public IP for the ingress (as per your end goal)
      az aks command invoke \
        --resource-group $(resourceGroup) \
        --name $(aksName) \
        --command "helm upgrade --install nginx-ingress ingress-nginx/ingress-nginx --namespace ingress-basic --create-namespace"

